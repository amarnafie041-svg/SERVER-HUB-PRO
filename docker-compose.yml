version: "3.8"

services:
  build-user-image:
    image: server-hub-user:latest
    build:
      context: .
      dockerfile: Dockerfile.user
    profiles:
      - setup

  server-hub:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret-in-production}
      - FILES_BASE_DIR=/home/runner
      - DOCKER_HOST=unix:///var/run/docker.sock
      - CONTAINER_IMAGE=server-hub-user:latest
      - CONTAINER_MEMORY=512
      - CONTAINER_CPU=0.5
      - CONTAINER_DISK=2g
      - DOCKER_NETWORK=server-hub-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - serverhub_data:/root/.serverhub
    depends_on:
      - build-user-image
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  serverhub_data:
