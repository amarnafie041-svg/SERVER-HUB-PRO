name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/*.gradle*', 'frontend/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build
        env: { VITE_API_URL: "https://server-hub-v5-wrpt.onrender.com" }

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK
        shell: bash
        working-directory: frontend/android
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log

      - name: Show Gradle errors
        if: failure()
        shell: bash
        run: |
          echo "::group::Gradle error log (last 30 lines)"
          tail -30 /tmp/gradle.log
          echo "::endgroup::"
          # Also extract the key error lines
          grep -i -E "(error|FAILED|FAILURE|Exception|Build failed)" /tmp/gradle.log | head -20

      - name: Verify APK
        if: success() || failure()
        run: ls -la frontend/android/app/build/outputs/**/*.apk 2>&1 || echo "No APK found"
        shell: bash

      - name: Upload gradle log
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SERVER-HUB-APK
          path: frontend/android/app/build/outputs/apk/debug/*.apk
